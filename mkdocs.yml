site_name: Colette
site_description: Multi-agent AI system for autonomous end-to-end software development
repo_url: https://github.com/Jss-on/colette
repo_name: Jss-on/colette

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - API Reference:
      - Overview: api/index.md
      - Schemas: api/schemas.md
      - LLM Gateway: api/llm.md
      - Orchestrator: api/orchestrator.md
      - Tools: api/tools.md
      - Observability: api/observability.md
      - Configuration: api/config.md
  - Specifications:
      - Software Requirements: Colette_Software_Requirements_Specification.md
      - System Architecture: MultiAgent_SDLC_System_Architecture.md
      - Implementation Guide: Complete_Guide_to_Building_AI_Agent_Systems.md
      - Development Phases: development_phase_plan.md
      - Requirements Traceability: requirements_traceability_matrix.md
